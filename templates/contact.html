<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | HelenAgritech</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-green-800 p-4 text-white">
        <div class="container mx-auto flex justify-between">
            <h1 class="font-bold">HelenAgritech</h1>
            <div class="space-x-4">
                <a href="/">Home</a>
                <a href="/about">Our Story</a>
                <a href="/news">News</a>
            </div>
        </div>
    </nav>
    <div class="container mx-auto py-12 px-6 max-w-lg">
        <h2 class="text-2xl font-bold text-green-900 mb-6">Send us a Message</h2>
        <form class="bg-white p-8 rounded shadow-md">
            <div class="mb-4">
                <label class="block text-gray-700">Your Name</label>
                <input type="text" class="w-full border p-2 rounded">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700">Inquiry Type</label>
                <select class="w-full border p-2 rounded">
                    <option>Crop Disease Question</option>
                    <option>Business Partnership</option>
                    <option>General Feedback</option>
                </select>
            </div>
            <button class="w-full bg-green-700 text-white py-2 rounded">Send Inquiry</button>
        </form>
    </div>
</body>
</html>
